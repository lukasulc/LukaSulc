## Homepage showcase
- id: "showcase_title"
  translation: "Hello, I’m Luka."

- id: "showcase_subtitle"
  translation: "Software Engineer"

- id: "showcase_description"
  translation: "I'm a Computer Scientist graduated from University of Zagreb. My academic experience revolved around Machine Learning and Artificial Intelligence as well as Robotics and Optimization.<br>Professionally, I've taken another path working as a Software Engineer. I've worked in the financial and building automation sectors as an Angular & Java Spring Developer.<br> My volunteering experience in <a target='_blank' href='https://www.linkedin.com/company/erasmus-student-network/'>Erasmus Student Network</a> combined with one semester abroad helped me develop problem solving skills, inclusive mindset and proficiency in English."

